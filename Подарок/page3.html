<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Березня - Жіночий день</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Rose.png" type="image/png">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Контейнер для квітів на фоні */
        #flower-garden {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .static-bouquet {
            position: absolute;
            width: 220px; 
            height: auto;
            transform: scale(0) rotate(-25deg);
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .static-bouquet.bloom {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        /* Центральний білий блок */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 25px;
            font-size: 26px;
        }
        
        .btn {
            padding: 18px 40px;
            font-size: 20px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border: none;
            outline: none;
        }

        .show-gif-btn {
            background-color: #ff4d6d;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }
        
        .show-gif-btn:hover {
            background-color: #d81b60;
            transform: scale(1.05);
        }

        /* Кнопка переходу (фіолетова) */
        .next-page-btn {
            background-color: #764ba2;
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
            margin-top: 20px;
            position: relative;
            z-index: 999;
        }

        .next-page-btn:hover {
            background-color: #5a368a;
            transform: scale(1.05);
        }

        /* Обгортка для гіфки та кнопки */
        #gifWrapper {
            margin-top: 25px;
            display: none; 
            opacity: 0;
            transform: translateY(30px) scale(0.8);
            transition: all 1s ease-out;
        }

        #gifWrapper.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .gif-box {
            padding-top: 56.250%;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .gif-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="flower-garden"></div>

    <div class="container">
        <h1>Для тебе розквітає найкраще! 🌸✨</h1>
        
        <button class="btn show-gif-btn" id="mainBtn" onclick="startSurprise()">Показати сюрприз</button>
        
        <div id="gifWrapper">
            <div class="gif-box">
                <iframe src="https://gifer.com/embed/Aq" frameBorder="0" allowFullScreen></iframe>
            </div>
            
            <div style="margin-top: 25px;">
                <a href="page4.html" class="btn next-page-btn">Йти далі ✨</a>
            </div>
        </div>
    </div>
    
    <script>
        const bouquetTypes = [
            'photos/buzok.png', 'photos/mak.png', 'photos/rose.png',
            'photos/hiposfile.png', 'photos/violets.png', 'photos/lavands.png'
        ];

        function startSurprise() {
            const btn = document.getElementById('mainBtn');
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 300);

            spawnBouquets();
            // Гіфка та кнопка з'являться через 3 секунди (коли квіти виростуть)
            setTimeout(showGif, 3000); 
        }

        function spawnBouquets() {
            const garden = document.getElementById('flower-garden');
            let finalBouquetList = [];
            
            // Створюємо набір по 3 букети кожного типу
            bouquetTypes.forEach(img => {
                finalBouquetList.push(img, img, img);
            });

            finalBouquetList.sort(() => Math.random() - 0.5);

            const flowerSize = 220; 
            const cols = Math.floor(window.innerWidth / (flowerSize - 50));
            const rows = Math.floor(window.innerHeight / (flowerSize - 50));
            
            let possiblePositions = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * (flowerSize - 40);
                    const y = r * (flowerSize - 40);
                    
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;

                    // Зона навколо центру, де квіти не з'являються
                    if (Math.abs(x + flowerSize/2 - centerX) > 280 || Math.abs(y + flowerSize/2 - centerY) > 250) {
                        possiblePositions.push({ x, y });
                    }
                }
            }

            possiblePositions.sort(() => Math.random() - 0.5);

            finalBouquetList.forEach((imgSrc, index) => {
                if (possiblePositions[index]) {
                    setTimeout(() => {
                        const bouquet = document.createElement('img');
                        bouquet.src = imgSrc;
                        bouquet.classList.add('static-bouquet');
                        
                        const pos = possiblePositions[index];
                        const driftX = Math.random() * 50 - 25;
                        const driftY = Math.random() * 50 - 25;

                        bouquet.style.left = (pos.x + driftX) + 'px';
                        bouquet.style.top = (pos.y + driftY) + 'px';
                        
                        garden.appendChild(bouquet);
                        setTimeout(() => bouquet.classList.add('bloom'), 50);
                    }, index * 180);
                }
            });
        }

        function showGif() {
            const wrapper = document.getElementById('gifWrapper');
            wrapper.style.display = 'block'; 
            
            // Плавна анімація появи
            setTimeout(() => {
                wrapper.classList.add('visible');
            }, 50);
        }
    </script>
</body>
</html>
