<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Березня - Твої сюрпризи</title>
     <link rel="icon" href="Rose.png" type="image/x-icon">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 85%;
            position: relative;
            z-index: 5;
            overflow: visible;
            /* Додав великий відступ зверху, щоб звільнити місце для дуги */
            margin-top: 100px; 
        }

        h1 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 26px;
        }

        /* Контейнер для квітів. Його верх тепер вище, ніж верх картки */
        .flower-arc {
            position: absolute;
            top: -10px; /* Трохи підняв, щоб дуга була вище */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 0;
            pointer-events: none;
        }

        .flower-item {
            position: absolute;
            width: 110px;
            max-width: 25vw;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
            /* Центрування: точка відліку для позиціонування - центр картинки */
            margin-left: -55px;
            margin-top: -55px;
        }

        .flower-item:hover {
            transform: scale(1.1) rotate(5deg) !important;
            z-index: 20;
        }

        #flower-meaning {
            min-height: 60px;
            margin-top: 20px;
            font-style: italic;
            color: #d81b60;
            font-weight: bold;
            font-size: 18px;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            /* Використав фіолетовий, як ти просив */
            background-color: #764ba2; 
            color: white;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .restart-btn:hover {
            background-color: #5a368a;
            transform: scale(1.05);
        }

        p {
            color: #333;
            font-size: 17px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="arc" class="flower-arc"></div>

        <h1>Твої сюрпризи 🎁</h1>
        <p>Ти прикрашаєш цей світ одним своїм поглядом. Нехай ці весняні квіти розкажуть тобі про те, яка ти особлива! 🌸</p>
        <p>PS: Кожна квітка має свою історію та значення. Натисти на них🌟</p>
        
        <div id="flower-meaning">Торкнись квітки, щоб дізнатися її таємницю...</div>

        <a href="index.html" class="btn restart-btn">Почати спочатку</a>
    </div>

    <script>
        const flowerData = [
            { img: 'photos/buzok.png', text: 'Бузок — символ першого кохання та весняного пробудження. 💜' },
            { img: 'photos/mak.png', text: 'Мак — символ мрійливості та безмежної краси. ❤️' },
            { img: 'photos/rose.png', text: 'Троянда — королева квітів, знак поваги та любові. 🌹' },
            { img: 'photos/hiposfile.png', text: 'Гіпсофіла — символ щирості та чистоти серця. ✨' },
            { img: 'photos/violets.png', text: 'Фіалки — означають вірність та особливу ніжність. 💜' },
            { img: 'photos/lavands.png', text: 'Лаванда — приносить спокій та витонченість. 🌿' }
        ];

        const arcContainer = document.getElementById('arc');
        const meaningDisplay = document.getElementById('flower-meaning');

        // КОРЕКЦІЯ ТРАЄКТОРІЇ ПО НАМАЛЬОВАНІЙ ТОБОЮ ЧЕРВОНІЙ ЛІНІЇ
        // "Пласкіша" дуга, яка йде чітко над карткою
        const radiusX = 230; // Ширина півкола (зробив ширше, щоб квіти не злипалися)
        const radiusY = 120; // Висота дуги (зменшив, щоб вона не піднімалася занадто високо)

        flowerData.forEach((flower, index) => {
            const img = document.createElement('img');
            img.src = flower.img;
            img.className = 'flower-item';
            
            // Кут розподілу: від 0 до 180 градусів (Math.PI)
            const angle = (index / (flowerData.length - 1)) * Math.PI;
            
            // Формула еліптичної дуги
            // Мінус Math.cos, щоб вони йшли зліва направо (Бузок -> Лаванда)
            const x = -Math.cos(angle) * radiusX;
            const y = -Math.sin(angle) * radiusY;

            // Встановлюємо координати. `top` від’ємний, тому квіти над точкою `top: 0`
            img.style.left = `calc(50% + ${x}px)`;
            img.style.top = `${y}px`;
            
            // Додав автоматичний нахил кожної квітки по дузі (як на червоній лінії)
            const rotation = (index - (flowerData.length-1)/2) * 20; // Нахил від -50 до +50 градусів
            img.style.transform = `rotate(${rotation}deg)`;

            img.onclick = () => {
                meaningDisplay.style.opacity = 0;
                setTimeout(() => {
                    meaningDisplay.innerText = flower.text;
                    meaningDisplay.style.opacity = 1;
                }, 150);
            };

            arcContainer.appendChild(img);
        });
    </script>
</body>
</html>
